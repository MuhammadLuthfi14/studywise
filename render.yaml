services:
  - type: web
    name: studywise-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:////var/data/studywise.db
      - key: CORS_ORIGINS
        sync: false
    disk:
      name: studywise-data
      mountPath: /var/data
      sizeGB: 1
